<!DOCTYPE html>
<html>

<head>

<title>Penilaian - TahfidzKu</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">


<style>

body{
font-family:'Segoe UI',sans-serif;
background:#f5f7f2;
margin:0;
}


.header{
background:#14532d;
color:white;
padding:25px;
text-align:center;
}


.container{
width:95%;
max-width:900px;
margin:25px auto;
}


.card{
background:white;
padding:25px;
border-radius:15px;
box-shadow:0 5px 15px rgba(0,0,0,0.1);
margin-bottom:20px;
}


h2{
color:#14532d;
text-align:center;
}


.form{

display:grid;
grid-template-columns:1fr 1fr;
gap:12px;

}


input,textarea{

padding:12px;
border:1px solid #ddd;
border-radius:8px;
font-size:15px;

}


textarea{

grid-column:1/3;
height:80px;

}



button{

grid-column:1/3;

padding:13px;

background:#16a34a;

color:white;

border:none;

border-radius:8px;

font-size:16px;

cursor:pointer;

}


button:hover{

background:#15803d;

}



table{

width:100%;

border-collapse:collapse;

margin-top:20px;

}



th,td{

padding:12px;

border-bottom:1px solid #ddd;

text-align:center;

}



th{

background:#14532d;

color:white;

}



.back{

display:block;

text-align:center;

color:#14532d;

text-decoration:none;

margin-top:20px;

}



@media(max-width:600px){

.form{

grid-template-columns:1fr;

}


textarea,button{

grid-column:1;

}

}


</style>

</head>


<body>


<div class="header">

<h1>📝 Penilaian Santri</h1>

<p>Input Nilai Hafalan Al-Qur'an</p>

</div>




<div class="container">



<div class="card">


<h2>Tambah Penilaian</h2>



<div class="form">


<input id="nis" placeholder="NIS">

<input id="nama" placeholder="Nama Santri">

<input id="tahfidz" placeholder="Nilai Tahfidz">

<input id="murojaah" placeholder="Nilai Murojaah">

<textarea id="catatan" placeholder="Catatan"></textarea>


<button onclick="simpanNilai()">
+ Simpan Nilai
</button>


</div>


</div>





<div class="card">


<h2>Daftar Nilai</h2>



<table>


<thead>

<tr>

<th>No</th>
<th>NIS</th>
<th>Nama</th>
<th>Tahfidz</th>
<th>Murojaah</th>
<th>Catatan</th>

</tr>

</thead>



<tbody id="tabelNilai">

</tbody>



</table>


</div>




<a class="back" href="index.html">
← Kembali Dashboard
</a>



</div>





<script>


const API = 
"https://script.google.com/macros/s/AKfycbzFzsfqU_wLmR4Gp23HB1bfjMBXblE8Qoz-fuhDkK7bWlsMW4pmL9EgY5anSZrGolJuZA/exec";




// =====================
// SIMPAN NILAI
// =====================

function simpanNilai(){


let data={


tipe:"nilai",

nis:document.getElementById("nis").value,

nama:document.getElementById("nama").value,

tahfidz:document.getElementById("tahfidz").value,

murojaah:document.getElementById("murojaah").value,

catatan:document.getElementById("catatan").value


};



fetch(API,{

method:"POST",

body:JSON.stringify(data)

})


.then(res=>res.json())


.then(()=>{


alert("✅ Nilai berhasil disimpan");



document.getElementById("nis").value="";
document.getElementById("nama").value="";
document.getElementById("tahfidz").value="";
document.getElementById("murojaah").value="";
document.getElementById("catatan").value="";



loadNilai();


})


.catch(()=>{


alert("❌ Gagal menyimpan nilai");


});


}





// =====================
// TAMPIL DATA NILAI
// =====================

function loadNilai(){


fetch(API+"?tipe=nilai")


.then(res=>res.json())


.then(data=>{


let tabel=document.getElementById("tabelNilai");


tabel.innerHTML="";



for(let i=1;i<data.length;i++){


tabel.innerHTML +=`

<tr>

<td>${i}</td>

<td>${data[i][0]}</td>

<td>${data[i][1]}</td>

<td>${data[i][2]}</td>

<td>${data[i][3]}</td>

<td>${data[i][4]}</td>

</tr>

`;

}


});


}




loadNilai();


</script>



</body>

</html>
