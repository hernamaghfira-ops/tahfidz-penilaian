<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Penilaian Tahfidz | TahfidzKu</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="css/style.css">

</head>

<body>

<div class="container mt-4">

<h2 class="mb-4">📝 Penilaian Tahfidz</h2>

<div class="card p-4">

<div class="row">

<div class="col-md-6 mb-3">
<label>Nama Santri</label>
<select class="form-control" id="nama">
<option>Pilih Santri</option>
</select>
</div>

<div class="col-md-6 mb-3">
<label>Tanggal</label>
<input type="date" class="form-control" id="tanggal">
</div>

<div class="col-md-6 mb-3">
<label>Nama Surat</label>
<input type="text" class="form-control" id="surat">
</div>

<div class="col-md-6 mb-3">
<label>Ayat</label>
<input type="text" class="form-control" placeholder="1-10" id="ayat">
</div>

<div class="col-md-4 mb-3">
<label>Nilai</label>
<input type="number" class="form-control" id="nilai">
</div>

<div class="col-md-4 mb-3">
<label>Target Tercapai</label>

<select class="form-control" id="target">

<option>✅ Ya</option>

<option>❌ Belum</option>

</select>

</div>

<div class="col-md-4 mb-3">
<label>Partner Muroja'ah</label>
<input type="text" class="form-control" id="partner">
</div>

<div class="col-md-6 mb-3">
<label>Muroja'ah Wajib</label>

<select class="form-control">

<option>✅ Sudah</option>

<option>❌ Belum</option>

</select>

</div>

<div class="col-md-6 mb-3">
<label>Target Besok</label>
<input type="text" class="form-control" id="targetBesok">
</div>

<div class="col-12 mb-3">
<label>Catatan</label>

<textarea class="form-control" rows="4" id="catatan"></textarea>

</div>

<div class="col-12">

<button class="btn btn-success btn-lg w-100" id="btnSimpan">

💾 Simpan Penilaian

</button>

</div>

</div>

</div>

<br>

<div class="card p-4">

<h4>Riwayat Penilaian</h4>

<table class="table table-bordered mt-3">

<thead>

<tr>

<th>Tanggal</th>

<th>Nama</th>

<th>Surat</th>

<th>Ayat</th>

<th>Nilai</th>

<th>Target</th>

</tr>

</thead>

<tbody id="riwayat">

</tbody>

</table>

</div>

</div>

<script src="js/app.js"></script>

</body>
</html>
