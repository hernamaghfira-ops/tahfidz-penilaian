<!DOCTYPE html>
<html>

<head>

<title>Data Santri - TahfidzKu</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">


<style>

body{
font-family:'Segoe UI',sans-serif;
background:#f5f7f2;
margin:0;
}


.header{
background:#14532d;
color:white;
padding:25px;
text-align:center;
}


.container{
width:95%;
max-width:900px;
margin:25px auto;
}


.card{
background:white;
padding:25px;
border-radius:15px;
box-shadow:0 5px 15px rgba(0,0,0,0.1);
margin-bottom:20px;
}


h2{
color:#14532d;
text-align:center;
}


.form{

display:grid;
grid-template-columns:1fr 1fr;
gap:12px;

}


input{

padding:12px;

border:1px solid #ddd;

border-radius:8px;

}


button{

grid-column:1/3;

padding:13px;

background:#16a34a;

color:white;

border:none;

border-radius:8px;

font-size:16px;

cursor:pointer;

}



table{

width:100%;

border-collapse:collapse;

margin-top:20px;

}


th,td{

padding:12px;

border-bottom:1px solid #ddd;

text-align:center;

}


th{

background:#14532d;

color:white;

}


.back{

display:block;

text-align:center;

color:#14532d;

text-decoration:none;

}



@media(max-width:600px){

.form{

grid-template-columns:1fr;

}


button{

grid-column:1;

}

}


</style>


</head>



<body>


<div class="header">

<h1>👥 Data Santri</h1>

<p>Manajemen Data Hafalan Santri</p>

</div>




<div class="container">



<div class="card">


<h2>Tambah Data Santri</h2>


<div class="form">


<input placeholder="NIS">


<input placeholder="Nama Santri">


<input placeholder="Kelas">


<input placeholder="Halaqah">


<input placeholder="Target Hafalan (Juz)">


<input placeholder="Jumlah Hafalan (Juz)">



<button>
+ Simpan Data
</button>


</div>


</div>





<div class="card">


<h2>Daftar Santri</h2>



<table>


<tr>

<th>No</th>

<th>NIS</th>

<th>Nama</th>

<th>Kelas</th>

<th>Halaqah</th>

<th>Target</th>

<th>Jumlah Hafalan</th>


</tr>



<tr>

<td>1</td>

<td>001</td>

<td>Ahmad</td>

<td>7A</td>

<td>Al-Fatih</td>

<td>5 Juz</td>

<td>2 Juz</td>


</tr>


</table>



</div>



<a class="back" href="index.html">
← Kembali ke Dashboard
</a>



</div>


</body>

</html>
