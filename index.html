<!DOCTYPE html>
<html>
<head>

<title>TahfidzKu</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">


<style>

body{
    font-family: 'Segoe UI', sans-serif;
    background:#f5f7f2;
    margin:0;
}


.header{
    background:#14532d;
    color:white;
    padding:25px;
    text-align:center;
}


.header h1{
    margin:0;
    font-size:32px;
}


.container{
    width:90%;
    max-width:500px;
    margin:30px auto;
}


.card{
    background:white;
    padding:25px;
    border-radius:15px;
    box-shadow:0 5px 15px rgba(0,0,0,0.1);
}


h2{
    color:#14532d;
    text-align:center;
}


input{

    width:100%;
    padding:12px;
    margin:8px 0;

    border:1px solid #ddd;
    border-radius:8px;

    box-sizing:border-box;

    font-size:15px;
}



button{

    width:100%;
    padding:13px;

    background:#16a34a;

    border:none;

    color:white;

    border-radius:8px;

    font-size:16px;

    cursor:pointer;

}



button:hover{

    background:#15803d;

}



.footer{

    text-align:center;

    margin-top:30px;

    color:#777;

    font-size:13px;

</style>
