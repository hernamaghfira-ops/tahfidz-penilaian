<!DOCTYPE html>
<html>

<head>

<title>Murojaah - TahfidzKu</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">


<style>

body{
font-family:'Segoe UI',sans-serif;
background:#f5f7f2;
margin:0;
}


.header{
background:#14532d;
color:white;
padding:25px;
text-align:center;
}


.container{
width:95%;
max-width:900px;
margin:25px auto;
}


.card{
background:white;
padding:25px;
border-radius:15px;
box-shadow:0 5px 15px rgba(0,0,0,0.1);
margin-bottom:20px;
}


h2{
color:#14532d;
text-align:center;
}



.form{

display:grid;
grid-template-columns:1fr 1fr;
gap:12px;

}



input,select,textarea{

padding:12px;

border:1px solid #ddd;

border-radius:8px;

}



textarea{

grid-column:1/3;

height:80px;

}



button{

grid-column:1/3;

padding:13px;

background:#16a34a;

color:white;

border:none;

border-radius:8px;

font-size:16px;

}



table{

width:100%;

border-collapse:collapse;

}



th,td{

padding:12px;

border-bottom:1px solid #ddd;

text-align:center;

}



th{

background:#14532d;

color:white;

}



.back{

display:block;

text-align:center;

color:#14532d;

text-decoration:none;

}


</style>


</head>



<body>


<div class="header">

<h1>📖 Murojaah</h1>

<p>Catatan Perkembangan Hafalan Santri</p>

</div>



<div class="container">


<div class="card">


<h2>Input Murojaah</h2>


<div class="form">


<input placeholder="Nama Santri">


<input type="date">


<input placeholder="Surah / Juz">


<select>

<option>Status Hafalan</option>

<option>Lancar</option>

<option>Cukup</option>

<option>Perlu Perbaikan</option>

</select>


<textarea placeholder="Catatan Pembimbing"></textarea>


<button>
+ Simpan Murojaah
</button>


</div>


</div>




<div class="card">


<h2>Riwayat Murojaah</h2>


<table>


<tr>

<th>No</th>

<th>Nama</th>

<th>Materi</th>

<th>Status</th>

<th>Catatan</th>

</tr>


<tr>

<td>1</td>

<td>Ahmad</td>

<td>Juz 30</td>

<td>Lancar</td>

<td>Perbaiki makhraj</td>

</tr>


</table>


</div>



<a class="back" href="index.html">
← Kembali Dashboard
</a>



</div>


</body>

</html>
