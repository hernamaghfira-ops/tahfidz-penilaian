<!DOCTYPE html>
<html>

<head>

<title>Partner - TahfidzKu</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">


<style>

body{
font-family:'Segoe UI',sans-serif;
background:#f5f7f2;
margin:0;
}


.header{
background:#14532d;
color:white;
padding:25px;
text-align:center;
}


.container{
width:95%;
max-width:900px;
margin:25px auto;
}


.card{

background:white;
padding:25px;
border-radius:15px;

box-shadow:0 5px 15px rgba(0,0,0,0.1);

margin-bottom:20px;

}



h2{

color:#14532d;
text-align:center;

}



.form{

display:grid;

grid-template-columns:1fr 1fr;

gap:12px;

}



input{

padding:12px;

border:1px solid #ddd;

border-radius:8px;

}



button{

grid-column:1/3;

padding:13px;

background:#16a34a;

color:white;

border:none;

border-radius:8px;

font-size:16px;

cursor:pointer;

}



table{

width:100%;

border-collapse:collapse;

margin-top:20px;

}



th,td{

padding:12px;

border-bottom:1px solid #ddd;

text-align:center;

}



th{

background:#14532d;

color:white;

}



.back{

display:block;

text-align:center;

color:#14532d;

text-decoration:none;

}



@media(max-width:600px){

.form{

grid-template-columns:1fr;

}


button{

grid-column:1;

}

}


</style>

</head>



<body>



<div class="header">

<h1>🤝 Partner TahfidzKu</h1>

<p>Data Pembimbing dan Pengelola Halaqah</p>

</div>



<div class="container">



<div class="card">


<h2>Tambah Partner</h2>


<div class="form">


<input placeholder="Nama Ustadz/Ustadzah">


<input placeholder="Kode Partner">


<input placeholder="Halaqah Binaan">


<input placeholder="Jumlah Santri">


<input placeholder="No. HP">


<input placeholder="Keterangan">


<button>
+ Simpan Partner
</button>


</div>


</div>




<div class="card">


<h2>Daftar Partner</h2>


<table>


<tr>

<th>No</th>

<th>Nama Partner</th>

<th>Halaqah</th>

<th>Jumlah Santri</th>

<th>Keterangan</th>

</tr>



<tr>

<td>1</td>

<td>Ustadz Ahmad</td>

<td>Al-Fatih</td>

<td>15</td>

<td>Pembimbing</td>

</tr>


</table>


</div>



<a class="back" href="index.html">
← Kembali Dashboard
</a>



</div>



</body>

</html>
